dictionary_metadata:
  name: mapem_image_elements_dictionary
  scope: visible_mapem_elements_from_supplied_image
  source_process_document: "MAPEM_Element_Source_Priority_Dictionary_Making_Process (4).md"
  purpose: >
    Apply the MAPEM mandatory element source-priority dictionary process
    to the elements visible in the supplied MAPEM tree image.
  path_normalisation_note: >
    The image shows intersections[] containing IntersectionGeometry. In the
    dictionary paths below, IntersectionGeometry is treated as the object type
    of each intersections[] item, so paths are normalised as
    map.intersections[].id.region rather than
    map.intersections[].IntersectionGeometry.id.region.

mandatory_mapem_paths:
  - header.protocolVersion
  - header.messageID
  - header.stationID
  - map.msgIssueRevision
  - map.intersections[].id.region
  - map.intersections[].id.id
  - map.intersections[].revision
  - map.intersections[].refPoint.lat
  - map.intersections[].refPoint.long

source_categories:
  site_configuration_information:
    confirmed_in_current_dataset: true
    active_mvp_dependency: true
    confirmed_subtypes:
      - signal_specification_pdf
      - controller_configuration_pdf
      - utc_form_docx
      - mova_schematic_docx
      - ram_8tx
      - mova_proprietary_file
    provides:
      - official_intersection_id
      - site_identity_evidence
      - explicit_station_id_if_documented
      - explicit_authority_identifier_if_documented

  site_plans_and_cad_files:
    confirmed_in_current_dataset: true
    active_mvp_dependency: true
    confirmed_subtypes:
      - cad_drawing
      - annotated_drawing_pdf
      - embedded_layout_in_specification_pdf
    provides:
      - title_block_site_identity
      - junction_centre_candidate
      - coordinate_reference_system_evidence_if_georeferenced

  gis_data:
    confirmed_in_current_dataset: false
    active_mvp_dependency: false
    possible_subtypes:
      - ordnance_survey
      - open_street_map
    provides:
      - geographic_cross_check
      - fallback_reference_point_evidence

elements:
  header.protocolVersion:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: constant
    required_fact_types: []
    source_priority:
      - priority: P1
        source_category: system_constant
        condition: value_defined_by_required_mapem_profile
    source_conditions:
      - profile_version_must_be_selected_before_generation
    manual_review_triggers:
      - protocol_version_constant_missing
      - protocol_version_constant_conflicts_with_profile
    validation_rules:
      - must_match_required_protocol_constant

  header.messageID:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: constant
    required_fact_types: []
    source_priority:
      - priority: P1
        source_category: system_constant
        condition: value_defined_by_mapem_message_type
    source_conditions:
      - message_type_must_be_mapem
    manual_review_triggers:
      - message_id_constant_missing
      - message_id_does_not_identify_mapem
    validation_rules:
      - must_identify_mapem_message

  header.stationID:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: client_configured
    required_fact_types:
      - station_id
    source_priority:
      - priority: P1
        source_category: site_configuration_information
        preferred_subtypes:
          - utc_form_docx
          - controller_configuration_pdf
          - signal_specification_pdf
        condition: only_if_station_id_is_explicit
      - priority: P2
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - annotated_drawing_pdf
          - cad_drawing
        condition: title_block_or_drawing_metadata_contains_explicit_station_id
      - priority: MANUAL
        source_category: manual_review
        condition: station_id_missing_or_conflicting_after_remaining_sources_checked
    source_conditions:
      - do_not_infer_station_id_from_filename_only
      - official_source_must_explicitly_label_the_station_id
    manual_review_triggers:
      - missing_station_id
      - conflicting_station_ids
      - station_id_only_available_from_filename
      - station_id_not_available_from_remaining_source_categories
    validation_rules:
      - station_id_must_be_populated
      - station_id_must_be_confirmed_by_explicit_source_or_manual_review

  map.msgIssueRevision:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: project_managed
    required_fact_types:
      - mapem_message_revision
    source_priority: []
    managed_by:
      - mapem_lifecycle_record
      - release_management_record
      - priority: MANUAL
        source_category: manual_review
        condition: revision_not_initialised_in_lifecycle_record
    source_conditions:
      - revision_is_managed_by_mapem_lifecycle_not_copied_from_document_issue
    manual_review_triggers:
      - msg_issue_revision_not_initialised
      - document_issue_number_used_as_msg_issue_revision
    validation_rules:
      - msg_issue_revision_must_be_present
      - msg_issue_revision_must_not_be_copied_from_ordinary_document_issue

  map.intersections[].id.region:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: client_configured
    required_fact_types:
      - road_regulator_id
    source_priority:
      - priority: P1
        source_category: site_configuration_information
        preferred_subtypes:
          - utc_form_docx
          - signal_specification_pdf
          - controller_configuration_pdf
        condition: only_if_road_regulator_id_is_explicit
      - priority: P2
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - annotated_drawing_pdf
          - cad_drawing
        condition: title_block_contains_explicit_road_regulator_identifier
      - priority: MANUAL
        source_category: manual_review
        condition: authority_identifier_unconfirmed_after_remaining_sources_checked
    source_conditions:
      - region_must_represent_the_road_regulator_identifier
      - local_authority_name_alone_is_not_sufficient_without_identifier_mapping
    manual_review_triggers:
      - missing_road_regulator_id
      - authority_identifier_unconfirmed
      - conflicting_road_regulator_ids
      - road_regulator_id_not_available_from_remaining_source_categories
    validation_rules:
      - region_must_be_populated
      - region_must_be_valid_for_the_deployment_domain

  map.intersections[].id.id:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: directly_extracted
    required_fact_types:
      - official_intersection_id
      - scn
      - orn
    source_priority:
      - priority: P1
        source_category: site_configuration_information
        preferred_subtypes:
          - utc_form_docx
          - controller_configuration_pdf
          - signal_specification_pdf
        use_for: official_site_identity
      - priority: P2
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - annotated_drawing_pdf
          - cad_drawing
        use_for: title_block_confirmation
      - priority: P3
        source_category: package_metadata
        preferred_subtypes:
          - filename
          - package_folder_name
        condition: fallback_only_with_manual_review
    source_conditions:
      - prefer_explicit_official_identifier_over_inferred_filename_identifier
      - drawing_title_block_can_confirm_but_should_not_override_official_configuration
    manual_review_triggers:
      - missing_official_intersection_id
      - conflicting_official_intersection_ids
      - only_filename_identifier_available
    validation_rules:
      - intersection_id_must_be_present
      - intersection_id_must_identify_one_intersection
      - intersection_id_must_be_unique_within_road_regulator_domain

  map.intersections[].revision:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: project_managed
    required_fact_types:
      - topology_revision
    source_priority: []
    managed_by:
      - mapem_lifecycle_record
      - topology_change_record
      - priority: MANUAL
        source_category: manual_review
        condition: topology_revision_missing_or_confused_with_document_revision
    source_conditions:
      - revision_changes_only_when_map_topology_changes
      - ordinary_document_issue_numbers_are_not_topology_revisions
    manual_review_triggers:
      - topology_revision_not_initialised
      - document_issue_mistaken_as_topology_revision
      - topology_change_without_revision_update
    validation_rules:
      - topology_revision_must_be_present
      - topology_revision_must_match_mapem_lifecycle_record
      - topology_revision_must_align_with_spatem_revision_when_paired

  map.intersections[].refPoint.lat:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: geometry_derived
    required_fact_types:
      - junction_centre_candidate
      - coordinate_reference_system_evidence
      - georeference_status
      - reference_point_latitude
    source_priority:
      - priority: P1
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - cad_drawing
        condition: cad_is_georeferenced_or_crs_is_reliably_known
      - priority: P2
        source_category: gis_data
        preferred_subtypes:
          - ordnance_survey
          - authoritative_gis
        condition: if_available
      - priority: P3
        source_category: gis_data
        preferred_subtypes:
          - open_street_map
        condition: approximate_fallback_or_cross_check
      - priority: MANUAL
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - annotated_drawing_pdf
          - embedded_layout_in_specification_pdf
        condition: manual_geographic_alignment_required
    source_conditions:
      - coordinate_reference_system_must_be_known
      - reference_point_should_represent_junction_conflict_area_centre
      - pdf_or_image_layout_alone_cannot_produce_reliable_latitude_without_alignment
    manual_review_triggers:
      - cad_coordinate_system_unknown
      - candidate_reference_points_conflict
      - reference_point_outside_expected_junction_area
      - only_manual_alignment_available
    validation_rules:
      - latitude_must_be_present
      - latitude_must_be_in_valid_range
      - reference_point_should_be_near_conflict_area_centre

  map.intersections[].refPoint.long:
    visible_in_image: true
    mandatory_in_scope: true
    population_mode: geometry_derived
    required_fact_types:
      - junction_centre_candidate
      - coordinate_reference_system_evidence
      - georeference_status
      - reference_point_longitude
    source_priority:
      - priority: P1
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - cad_drawing
        condition: cad_is_georeferenced_or_crs_is_reliably_known
      - priority: P2
        source_category: gis_data
        preferred_subtypes:
          - ordnance_survey
          - authoritative_gis
        condition: if_available
      - priority: P3
        source_category: gis_data
        preferred_subtypes:
          - open_street_map
        condition: approximate_fallback_or_cross_check
      - priority: MANUAL
        source_category: site_plans_and_cad_files
        preferred_subtypes:
          - annotated_drawing_pdf
          - embedded_layout_in_specification_pdf
        condition: manual_geographic_alignment_required
    source_conditions:
      - coordinate_reference_system_must_be_known
      - reference_point_should_represent_junction_conflict_area_centre
      - pdf_or_image_layout_alone_cannot_produce_reliable_longitude_without_alignment
    manual_review_triggers:
      - cad_coordinate_system_unknown
      - candidate_reference_points_conflict
      - reference_point_outside_expected_junction_area
      - only_manual_alignment_available
    validation_rules:
      - longitude_must_be_present
      - longitude_must_be_in_valid_range
      - reference_point_should_be_near_conflict_area_centre
